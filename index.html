<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosaicos MC | Revestimientos con caracter</title>
    <meta
      name="description"
      content="Sitio demo para una marca de revestimientos, mosaicos y superficies de autor. Incluye paginas internas y contenido de ejemplo listo para reemplazar."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/site.css" />
  </head>
  <body>
    <div class="shell">
      <div class="grain"></div>
      <header class="site-header">
        <div class="site-header__inner">
          <a class="brand" href="./" aria-label="Mosaicos MC">
            <img class="brand__logo" src="assets/img/logo-negro.png" alt="Mosaicos MC" />
          </a>
          <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-label="Abrir menu">
            <span>+</span>
          </button>
          <nav class="site-nav" data-site-nav aria-label="Principal">
            <a class="site-nav__link" href="nosotros/">Nosotros</a>
            <a class="site-nav__link" href="productos/">Productos</a>
            <a class="site-nav__link" href="obras/">Obras</a>
            <a class="site-nav__link" href="descargas/">Descargas</a>
            <a class="site-nav__link" href="blog/">Blog</a>
            <a class="site-nav__link" href="contacto/">Contacto</a>
          </nav>
        </div>
      </header>

      <main>
        <section class="home-slider" data-home-slider aria-label="Slider principal">
          <div class="home-slider__slides">
            <article class="home-slide is-active" data-slide style="--accent-circle: rgba(255,253,250,0.92); --accent-dot: #171311;">
              <div class="home-slide__content">
                <h1 class="home-slide__outline">HOLA</h1>
                <h2 class="home-slide__subtitle">somos<br />mosaicos mc</h2>
                <a class="home-slide__cta" href="nosotros/">Conocenos &gt;</a>
              </div>
              <div class="home-slide__art">
                <div class="home-slide__circle home-slide__circle--left"></div>
                <div class="home-slide__circle home-slide__circle--bottom"></div>
                <figure class="home-slide__frame home-slide__frame--top-left">
                  <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=1200&q=80" alt="Textura mineral en primer plano" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--bottom-left">
                  <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=1200&q=80" alt="Superficie arquitectonica de piedra" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--right">
                  <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80" alt="Interior con materiales calidos" />
                </figure>
              </div>
            </article>

            <article class="home-slide" data-slide style="--accent-circle: rgba(216,196,173,0.92); --accent-dot: #d8c4ad;">
              <div class="home-slide__content">
                <h1 class="home-slide__outline">PRODUCTOS</h1>
                <h2 class="home-slide__subtitle">creamos<br />espacios</h2>
                <a class="home-slide__cta" href="productos/">Ver productos &gt;</a>
              </div>
              <div class="home-slide__art">
                <div class="home-slide__circle home-slide__circle--left"></div>
                <div class="home-slide__circle home-slide__circle--bottom"></div>
                <figure class="home-slide__frame home-slide__frame--top-left">
                  <img src="https://images.unsplash.com/photo-1460317442991-0ec209397118?auto=format&fit=crop&w=1200&q=80" alt="Placa clara de revestimiento" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--bottom-left">
                  <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1200&q=80" alt="Muestras sobre mesa" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--right">
                  <img src="https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1200&q=80" alt="Muro de fachada con textura" />
                </figure>
              </div>
            </article>

            <article class="home-slide" data-slide style="--accent-circle: rgba(48,41,38,0.18); --accent-dot: #302926;">
              <div class="home-slide__content">
                <h1 class="home-slide__outline">COLECCION</h1>
                <h2 class="home-slide__subtitle">tramas<br />con caracter</h2>
                <a class="home-slide__cta" href="productos/coleccion-cantera/">Ver coleccion &gt;</a>
              </div>
              <div class="home-slide__art">
                <div class="home-slide__circle home-slide__circle--left"></div>
                <div class="home-slide__circle home-slide__circle--bottom"></div>
                <figure class="home-slide__frame home-slide__frame--top-left">
                  <img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80" alt="Interior contemporaneo con textura" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--bottom-left">
                  <img src="https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?auto=format&fit=crop&w=1200&q=80" alt="Textura en dormitorio" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--right">
                  <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=1200&q=80" alt="Superficie en gran formato" />
                </figure>
              </div>
            </article>

            <article class="home-slide" data-slide style="--accent-circle: rgba(123,111,102,0.22); --accent-dot: #7b6f66;">
              <div class="home-slide__content">
                <h1 class="home-slide__outline">OBRAS</h1>
                <h2 class="home-slide__subtitle">para<br />inspirarte</h2>
                <a class="home-slide__cta" href="obras/">Ver galeria &gt;</a>
              </div>
              <div class="home-slide__art">
                <div class="home-slide__circle home-slide__circle--left"></div>
                <div class="home-slide__circle home-slide__circle--bottom"></div>
                <figure class="home-slide__frame home-slide__frame--top-left">
                  <img src="https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=1200&q=80" alt="Fachada residencial revestida" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--bottom-left">
                  <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1200&q=80" alt="Cocina con muro texturado" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--right">
                  <img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80" alt="Showroom de materiales" />
                </figure>
              </div>
            </article>

            <article class="home-slide" data-slide style="--accent-circle: rgba(185,137,66,0.24); --accent-dot: #b98942;">
              <div class="home-slide__content">
                <h1 class="home-slide__outline">CONTACTO</h1>
                <h2 class="home-slide__subtitle">estamos<br />para ayudarte</h2>
                <a class="home-slide__cta" href="contacto/">Contactanos &gt;</a>
              </div>
              <div class="home-slide__art">
                <div class="home-slide__circle home-slide__circle--left"></div>
                <div class="home-slide__circle home-slide__circle--bottom"></div>
                <figure class="home-slide__frame home-slide__frame--top-left">
                  <img src="https://images.unsplash.com/photo-1497366754035-f200968a6e72?auto=format&fit=crop&w=1200&q=80" alt="Sector de atencion comercial" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--bottom-left">
                  <img src="https://images.unsplash.com/photo-1484154218962-a197022b5858?auto=format&fit=crop&w=1200&q=80" alt="Mesa con muestras" />
                </figure>
                <figure class="home-slide__frame home-slide__frame--right">
                  <img src="https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1200&q=80" alt="Detalle de textura aplicada" />
                </figure>
              </div>
            </article>
          </div>

          <div class="home-slider__controls">
            <button class="home-slider__arrow" type="button" data-slide-prev aria-label="Slide anterior">‹</button>
            <div class="home-slider__dots" data-slide-dots></div>
            <button class="home-slider__arrow" type="button" data-slide-next aria-label="Slide siguiente">›</button>
          </div>
        </section>
      </main>
    </div>
    <script src="assets/js/site.js"></script>
  </body>
</html>
